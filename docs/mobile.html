<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scoreboard (Mobile)</title>
  <style>
    :root {
      --border: #d9d9d9;
      --muted: #666;
      --points-bg: #fff4cc;
    }
    * { box-sizing: border-box; }
    body { font-family: Arial, sans-serif; margin: 12px; }
    .box { border: 1px solid var(--border); border-radius: 10px; padding: 10px; }
    .muted { color: var(--muted); font-size: 12px; }
    h2 { margin: 0 0 8px 0; font-size: 18px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; table-layout: fixed; }
    th, td { border-bottom: 1px solid #eee; padding: 6px 4px; text-align: left; vertical-align: top; }
    .flag { width: 18px; height: 12px; object-fit: cover; border: 1px solid #ddd; border-radius: 3px; vertical-align: middle; margin-right: 4px; }
    .athleteCell { line-height: 1.2; }
    .athleteMain { font-weight: 700; }
    .athleteMeta { color: var(--muted); font-size: 11px; margin-top: 2px; }
    .scoreWrap { display: flex; flex-direction: column; gap: 2px; }
    .resultLine { color: var(--muted); font-size: 11px; }
    .pointsCell, th.pointsCell { background: var(--points-bg); }
  </style>
</head>
<body>
  <div class="muted" id="meta">Loading...</div>
  <label>Таблица:
    <select id="sel"></select>
  </label>
  <div class="box" id="content"></div>

<script>
const DIVS = ["BEGSCAL_F","BEGSCAL_M","INT_F","INT_M"];
const DIV_NAMES = {
  "BEGSCAL_F":"BEG/SCAL — Women",
  "BEGSCAL_M":"BEG/SCAL — Men",
  "INT_F":"Intermediate — Women",
  "INT_M":"Intermediate — Men",
};
const sel = document.getElementById("sel");
DIVS.forEach(id => {
  const opt = document.createElement("option");
  opt.value = id;
  opt.textContent = DIV_NAMES[id] || id;
  sel.appendChild(opt);
});
function fmt(p){ if (p===null||p===undefined) return "—"; return (typeof p==="number") ? p.toFixed(2).replace(/\.00$/,"") : String(p); }
function safeText(s){ return (s===null||s===undefined) ? "" : String(s); }
function scoreHtml(score) {
  if (!score) return `<div class="scoreWrap"><div>—</div><div class="resultLine">—</div></div>`;
  return `<div class="scoreWrap"><div>${fmt(score.points)}</div><div class="resultLine">${safeText(score.display_result || "—")}</div></div>`;
}
function render(divId, divData) {
  const el = document.getElementById("content");
  const rows = (divData.rows || []);
  let html = `<h2>${divData.title || divId}</h2>`;
  html += `<table><thead><tr>
    <th style="width:8%">#</th>
    <th style="width:44%">Атлет</th>
    <th class="pointsCell" style="width:12%">W1</th>
    <th class="pointsCell" style="width:12%">W2A</th>
    <th class="pointsCell" style="width:12%">W2B</th>
    <th class="pointsCell" style="width:12%">W3</th>
  </tr></thead><tbody>`;

  rows.forEach((r, idx) => {
    const flag = r.flag ? `<img class="flag" src="${r.flag}" />` : "";
    html += `<tr>
      <td>${idx+1}</td>
      <td class="athleteCell"><div class="athleteMain">${flag}${safeText(r.full_name)}</div><div class="athleteMeta">${safeText(r.age)} лет · ${safeText(r.club)} · ${safeText(r.city)}</div><div class="athleteMeta">Σ ${fmt(r.total)}</div></td>
      <td class="pointsCell">${scoreHtml(r.scores?.WOD1)}</td>
      <td class="pointsCell">${scoreHtml(r.scores?.WOD2A)}</td>
      <td class="pointsCell">${scoreHtml(r.scores?.WOD2B)}</td>
      <td class="pointsCell">${scoreHtml(r.scores?.WOD3)}</td>
    </tr>`;
  });

  html += `</tbody></table>`;
  el.innerHTML = html;
}
let cached = null;
async function load() {
  const res = await fetch(`results.json?ts=${Date.now()}`);
  cached = await res.json();
  document.getElementById("meta").textContent = `Обновлено: ${cached.generated_at}`;
  render(sel.value || DIVS[0], cached.divisions[sel.value || DIVS[0]]);
}
sel.addEventListener("change", () => { if (cached) render(sel.value, cached.divisions[sel.value]); });
sel.value = DIVS[0];
load();
setInterval(load, 5000);
</script>
</body>
</html>

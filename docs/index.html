<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scoreboard TV</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 10px; background: #fff; color: #111; }
    .meta { color: #666; font-size: 12px; margin-bottom: 8px; }
    .layout { display: grid; grid-template-columns: 2.3fr 1fr; gap: 10px; align-items: start; }
    .tables { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .box { border: 1px solid #ddd; border-radius: 10px; padding: 8px; overflow: hidden; }
    h2, h3 { margin: 0 0 6px 0; }
    h2 { font-size: 15px; }
    h3 { font-size: 14px; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th, td { border-bottom: 1px solid #eee; padding: 3px 4px; text-align: left; vertical-align: top; }
    th.points, td.points { background: #eef5ff; }
    .athlete-meta { color: #666; font-size: 10px; line-height: 1.2; }
    .flag { width: 16px; height: 11px; object-fit: cover; border: 1px solid #ddd; border-radius: 2px; vertical-align: middle; margin-right: 4px; }
    .res { display:block; color:#666; font-size:10px; }
    .heat-card { border: 1px solid #eee; border-radius: 8px; padding: 6px; margin-bottom: 8px; }
    .lane { display:grid; grid-template-columns: 22px 1fr; gap: 6px; padding: 3px 0; border-bottom: 1px dashed #eee; font-size: 12px; }
    .lane:last-child { border-bottom: none; }
    .tabs { display:flex; gap:6px; margin-bottom: 8px; flex-wrap: wrap; }
    .tabbtn { border:1px solid #ccc; background:#f7f7f7; border-radius:999px; padding:4px 8px; cursor:pointer; font-size:12px; }
    .tabbtn.active { background:#111; color:#fff; border-color:#111; }
  </style>
</head>
<body>
  <div class="meta" id="meta">Loading...</div>
  <div class="layout">
    <div class="tables" id="tables"></div>
    <div class="box">
      <h2>Заходы</h2>
      <div class="tabs" id="tabs"></div>
      <div id="heats"></div>
    </div>
  </div>
<script>
const DIV_ORDER = ["BEGSCAL_F","BEGSCAL_M","INT_F","INT_M"];
const DIV_SHORT = {"BEGSCAL_F":"BEG/SCAL W","BEGSCAL_M":"BEG/SCAL M","INT_F":"INT W","INT_M":"INT M"};
let currentWorkout = 'WOD1';
let cache = null;
function fmt(v){ if(v===null||v===undefined) return '—'; return (typeof v==='number') ? String(Number(v.toFixed ? v.toFixed(2) : v)).replace(/\.00$/,'') : String(v); }
function safe(s){ return s===null||s===undefined ? '' : String(s); }
function renderTables(data){
  const root = document.getElementById('tables');
  root.innerHTML = '';
  DIV_ORDER.forEach(divId => {
    const div = data.divisions?.[divId];
    if(!div) return;
    const box = document.createElement('div');
    box.className = 'box';
    let html = `<h2>${safe(div.title)}</h2><table><thead><tr><th>#</th><th>Атлет</th><th class="points">W1</th><th class="points">W2A</th><th class="points">W2B</th><th class="points">W3</th><th class="points">ИТОГО</th></tr></thead><tbody>`;
    (div.rows||[]).forEach(r => {
      const flag = r.flag ? `<img class="flag" src="${r.flag}" />` : '';
      const meta = [r.age ? `${r.age}` : '', r.club || '', r.city || ''].filter(Boolean).join(' · ');
      html += `<tr><td>${fmt(r.place)}</td><td>${flag}${safe(r.full_name)}<div class="athlete-meta">${safe(meta)}</div></td>` +
        `<td class="points">${fmt(r.scores?.WOD1?.points)}<span class="res">${safe(r.scores?.WOD1?.result_text)}</span></td>` +
        `<td class="points">${fmt(r.scores?.WOD2A?.points)}<span class="res">${safe(r.scores?.WOD2A?.result_text)}</span></td>` +
        `<td class="points">${fmt(r.scores?.WOD2B?.points)}<span class="res">${safe(r.scores?.WOD2B?.result_text)}</span></td>` +
        `<td class="points">${fmt(r.scores?.WOD3?.points)}<span class="res">${safe(r.scores?.WOD3?.result_text)}</span></td>` +
        `<td class="points">${fmt(r.total)}</td></tr>`;
    });
    html += '</tbody></table>';
    box.innerHTML = html;
    root.appendChild(box);
  });
}
function renderTabs(data){
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  ['WOD1','WOD2','WOD3'].forEach(id => {
    const btn = document.createElement('button');
    btn.className = 'tabbtn' + (id===currentWorkout ? ' active' : '');
    btn.textContent = data.heats?.[id]?.title || id;
    btn.onclick = () => { currentWorkout = id; renderTabs(data); renderHeats(data); };
    tabs.appendChild(btn);
  });
}
function renderHeats(data){
  const root = document.getElementById('heats');
  const workout = data.heats?.[currentWorkout];
  if(!workout){ root.innerHTML = '<div class="meta">Нет заходов</div>'; return; }
  let html = '';
  DIV_ORDER.forEach(divId => {
    const heats = workout.divisions?.[divId] || [];
    if(!heats.length) return;
    html += `<h3>${safe(DIV_SHORT[divId] || divId)}</h3>`;
    heats.forEach(h => {
      html += `<div class="heat-card"><strong>Заход ${h.heat}</strong>`;
      (h.assignments || []).forEach(a => {
        const flag = a.flag ? `<img class="flag" src="${a.flag}" />` : '';
        html += `<div class="lane"><div>${a.lane}</div><div>${flag}${safe(a.full_name)}</div></div>`;
      });
      html += `</div>`;
    });
  });
  root.innerHTML = html || '<div class="meta">Заходы ещё не сформированы</div>';
}
async function load(){
  const res = await fetch(`results.json?ts=${Date.now()}`);
  cache = await res.json();
  document.getElementById('meta').textContent = `Обновлено: ${cache.generated_at}`;
  renderTables(cache); renderTabs(cache); renderHeats(cache);
}
load(); setInterval(load, 5000);
</script>
</body>
</html>
